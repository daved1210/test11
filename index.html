<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0D0D0D;
      --bg-secondary: #1A1A1A;
      --bg-card: #141414;
      --text-primary: #FAFAFA;
      --text-secondary: #8C8C8C;
      --accent: #E63946;
      --accent-glow: rgba(230, 57, 70, 0.4);
      --accent-dim: rgba(230, 57, 70, 0.15);
      --border: #2D2D2D;
      --border-light: #3D3D3D;
      --priority-high: #E63946;
      --priority-medium: #F4A261;
      --priority-low: #2A9D8F;
    }

    [data-theme="light"] {
      --bg-primary: #F5F5F5;
      --bg-secondary: #FFFFFF;
      --bg-card: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #6B6B6B;
      --accent: #DC3545;
      --accent-glow: rgba(220, 53, 69, 0.3);
      --accent-dim: rgba(220, 53, 69, 0.1);
      --border: #E0E0E0;
      --border-light: #D0D0D0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Noto Sans SC', 'JetBrains Mono', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body.lang-en {
      font-family: 'JetBrains Mono', sans-serif;
    }

    /* Animated background */
    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent);
      opacity: 0;
      animation: floatParticle 8s infinite ease-in-out;
    }

    @keyframes floatParticle {
      0% {
        opacity: 0;
        transform: translateY(100vh) scale(0);
      }
      10% {
        opacity: 0.6;
      }
      90% {
        opacity: 0.6;
      }
      100% {
        opacity: 0;
        transform: translateY(-20vh) scale(1);
      }
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 100;
    }

    ::selection {
      background: var(--accent);
      color: var(--text-primary);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-light);
      border-radius: 3px;
      transition: background 0.3s;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    /* Container */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 40px;
      position: relative;
      z-index: 10;
    }

    /* Header */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 80px;
      position: relative;
    }

    .header-content {
      animation: headerReveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(40px);
    }

    @keyframes headerReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Geometric decoration */
    .geo-circle {
      width: 60px;
      height: 60px;
      border: 3px solid var(--accent);
      border-radius: 50%;
      position: relative;
      animation: geoFloat 6s ease-in-out infinite;
    }

    .geo-circle::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      animation: innerPulse 2s ease-in-out infinite;
    }

    @keyframes geoFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(5deg); }
    }

    @keyframes innerPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(0.7); opacity: 0.6; }
    }

    .title {
      font-family: 'Bebas Neue', 'Noto Sans SC', sans-serif;
      font-size: clamp(42px, 10vw, 80px);
      letter-spacing: 4px;
      line-height: 1;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleFade 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      opacity: 0;
    }

    @keyframes titleFade {
      from {
        opacity: 0;
        letter-spacing: 20px;
      }
      to {
        opacity: 1;
        letter-spacing: 4px;
      }
    }

    .title-accent {
      color: var(--accent);
      -webkit-text-fill-color: var(--accent);
    }

    .subtitle {
      font-size: 12px;
      letter-spacing: 8px;
      color: var(--text-secondary);
      margin-top: 8px;
      animation: subtitleFade 1s ease-out 0.4s forwards;
      opacity: 0;
    }

    @keyframes subtitleFade {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Header Controls */
    .header-controls {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      gap: 12px;
      animation: controlsSlide 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
      opacity: 0;
      transform: translateX(20px);
    }

    @keyframes controlsSlide {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .lang-toggle,
    .theme-toggle {
      display: flex;
      gap: 0;
      border: 2px solid var(--border);
    }

    .lang-btn,
    .theme-btn {
      background: transparent;
      border: none;
      padding: 8px 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .lang-btn:first-child,
    .theme-btn:first-child {
      border-right: 1px solid var(--border);
    }

    .lang-btn::after,
    .theme-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      transform: translateX(-50%);
    }

    .lang-btn:hover,
    .theme-btn:hover {
      color: var(--text-primary);
    }

    .lang-btn:hover::after,
    .theme-btn:hover::after {
      width: 80%;
    }

    .lang-btn.active,
    .theme-btn.active {
      color: var(--accent);
    }

    .lang-btn.active::after,
    .theme-btn.active::after {
      width: 100%;
    }

    .theme-btn svg {
      width: 16px;
      height: 16px;
      vertical-align: middle;
    }

    .theme-btn.active[data-theme="light"] {
      color: #FFD700;
    }

    .theme-btn.active[data-theme="dark"] {
      color: #6B5B95;
    }

    /* Decorative line */
    .header-line {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent) 30%, var(--border) 30%, var(--border) 100%);
      margin-bottom: 60px;
      animation: expandLine 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both;
      transform-origin: left;
    }

    @keyframes expandLine {
      from { transform: scaleX(0); opacity: 0; }
      to { transform: scaleX(1); opacity: 1; }
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 40px;
      margin-bottom: 40px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      transform: translateY(30px);
    }

    .stat:nth-child(1) {
      animation: statReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
    }

    .stat:nth-child(2) {
      animation: statReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
    }

    @keyframes statReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      color: var(--accent);
      line-height: 1;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .stat-value.bump {
      transform: scale(1.2);
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--text-secondary);
    }

    /* Input Section */
    .input-section {
      margin-bottom: 60px;
      opacity: 0;
      transform: translateY(30px);
      animation: inputReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
    }

    @keyframes inputReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .priority-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .priority-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--text-secondary);
      margin-right: 8px;
      align-self: center;
    }

    .priority-btn {
      background: transparent;
      border: 2px solid var(--border);
      padding: 8px 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .priority-btn:hover {
      border-color: var(--text-secondary);
      color: var(--text-primary);
      transform: translateY(-2px);
    }

    .priority-btn.active {
      color: #fff;
      border-color: transparent;
      transform: translateY(0);
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    .priority-btn.active::before {
      opacity: 0;
    }

    .priority-btn[data-priority="high"].active {
      background: var(--priority-high);
      box-shadow: 0 4px 20px rgba(230, 57, 70, 0.5);
    }

    .priority-btn[data-priority="medium"].active {
      background: var(--priority-medium);
      box-shadow: 0 4px 20px rgba(244, 162, 97, 0.5);
    }

    .priority-btn[data-priority="low"].active {
      background: var(--priority-low);
      box-shadow: 0 4px 20px rgba(42, 157, 143, 0.5);
    }

    .input-wrapper {
      position: relative;
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      padding: 4px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .input-wrapper::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      transform: translateX(4px);
      box-shadow: 0 8px 40px rgba(230, 57, 70, 0.15);
    }

    .input-wrapper:focus-within::before {
      opacity: 1;
      animation: glowPulse 1.5s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .input-wrapper.shake {
      animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(4px); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }

    .task-input {
      width: 100%;
      background: transparent;
      border: none;
      padding: 20px 24px;
      font-family: inherit;
      font-size: 16px;
      color: var(--text-primary);
      outline: none;
      transition: all 0.3s;
    }

    .task-input::placeholder {
      color: var(--text-secondary);
    }

    .add-btn {
      position: absolute;
      right: 4px;
      top: 4px;
      bottom: 4px;
      background: var(--accent);
      border: none;
      padding: 0 28px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
      position: relative;
    }

    .add-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .add-btn:hover::before {
      transform: translateX(100%);
    }

    .add-btn:hover {
      background: #ff4d5a;
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(230, 57, 70, 0.4);
    }

    .add-btn:active {
      transform: scale(0.98);
    }

    .add-btn svg {
      width: 16px;
      height: 16px;
      transition: transform 0.3s;
    }

    .add-btn:hover svg {
      transform: rotate(90deg);
    }

    /* Sections */
    .section {
      margin-bottom: 60px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 4px;
      color: var(--text-primary);
      position: relative;
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .section:hover .section-title::after {
      width: 100%;
    }

    .section-count {
      background: var(--accent);
      color: var(--text-primary);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      padding: 2px 10px;
      min-width: 32px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .section-count.bump {
      transform: scale(1.3);
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
      transition: background 0.3s;
    }

    .section:hover .section-line {
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    /* Task List */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      opacity: 0;
      transform: translateX(-30px);
    }

    .task-item.show {
      opacity: 1;
      transform: translateX(0);
    }

    .task-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background: var(--accent);
      opacity: 0;
      transition: all 0.3s;
    }

    .task-item:hover {
      transform: translateY(-4px) translateX(4px);
      border-color: var(--border-light);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    .task-item:hover::before {
      opacity: 1;
    }

    .task-item.priority-high::before {
      background: var(--priority-high);
      opacity: 1;
    }

    .task-item.priority-medium::before {
      background: var(--priority-medium);
      opacity: 1;
    }

    .task-item.priority-low::before {
      background: var(--priority-low);
      opacity: 1;
    }

    .task-item.completed::before {
      background: var(--text-secondary);
      opacity: 0.5;
    }

    .task-item.completed {
      opacity: 0.5;
      transform: translateX(0);
    }

    .task-item.completed:hover {
      transform: translateY(-2px);
    }

    .task-item:not(.completed):hover::before {
      width: 6px;
    }

    .task-item.removing {
      animation: taskRemove 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes taskRemove {
      to {
        opacity: 0;
        transform: translateX(100px) scale(0.9);
        margin-top: -60px;
        padding: 0;
        height: 0;
      }
    }

    /* Checkbox */
    .checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .checkbox:hover {
      border-color: var(--accent);
      transform: scale(1.1);
    }

    .checkbox svg {
      width: 14px;
      height: 14px;
      stroke: var(--text-primary);
      stroke-width: 3;
      opacity: 0;
      transform: scale(0) rotate(-90deg);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .task-item.completed .checkbox {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1);
    }

    .task-item.completed .checkbox svg {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    /* Priority indicator */
    .priority-indicator {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-right: 8px;
      position: relative;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .priority-indicator::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid currentColor;
      opacity: 0.4;
    }

    @keyframes priorityPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.8; }
    }

    .priority-indicator.high {
      background: var(--priority-high);
      box-shadow:
        0 0 20px var(--priority-high),
        0 0 40px rgba(230, 57, 70, 0.3),
        inset 0 0 10px rgba(255, 255, 255, 0.2);
      color: var(--priority-high);
      animation: priorityPulse 2s ease-in-out infinite;
    }

    .priority-indicator.medium {
      background: var(--priority-medium);
      box-shadow:
        0 0 20px var(--priority-medium),
        0 0 40px rgba(244, 162, 97, 0.3),
        inset 0 0 10px rgba(255, 255, 255, 0.2);
      color: var(--priority-medium);
      animation: priorityPulse 2s ease-in-out infinite 0.4s;
    }

    .priority-indicator.low {
      background: var(--priority-low);
      box-shadow:
        0 0 20px var(--priority-low),
        0 0 40px rgba(42, 157, 143, 0.3),
        inset 0 0 10px rgba(255, 255, 255, 0.2);
      color: var(--priority-low);
      animation: priorityPulse 2s ease-in-out infinite 0.8s;
    }

    /* Task Content */
    .task-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }

    .task-text {
      font-size: 15px;
      color: var(--text-primary);
      letter-spacing: 0.5px;
      transition: all 0.4s;
      position: relative;
    }

    .task-item.completed .task-text {
      color: var(--text-secondary);
    }

    .task-item.completed .task-text::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: var(--text-secondary);
      animation: strikethrough 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transform-origin: left;
    }

    @keyframes strikethrough {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    .task-time {
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 1px;
      transition: color 0.3s;
    }

    .task-item:hover .task-time {
      color: var(--text-primary);
    }

    /* Task Actions */
    .task-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .task-item:hover .task-actions {
      opacity: 1;
    }

    .task-actions .delete-btn,
    .task-actions .edit-btn {
      transform: translateX(0);
    }

    .delete-btn,
    .edit-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateX(10px);
    }

    .delete-btn:hover {
      color: var(--accent);
      transform: scale(1.2) rotate(90deg);
    }

    .edit-btn:hover {
      color: var(--priority-medium);
      transform: scale(1.2);
    }

    .delete-btn svg,
    .edit-btn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.3s;
    }

    /* Inline Edit */
    .task-text-input {
      width: 100%;
      background: var(--bg-secondary);
      border: 2px solid var(--accent);
      padding: 8px 12px;
      font-family: inherit;
      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      border-radius: 4px;
      display: none;
    }

    .task-item.editing .task-text {
      display: none;
    }

    .task-item.editing .task-text-input {
      display: block;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      border: 2px dashed var(--border);
      opacity: 0;
      animation: emptyReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.5s forwards;
    }

    @keyframes emptyReveal {
      to { opacity: 1; }
    }

    .empty-state-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 4px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      animation: emptyPulse 3s ease-in-out infinite;
    }

    @keyframes emptyPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .empty-state-hint {
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--text-secondary);
      opacity: 0.6;
    }

    /* Bottom decorations */
    .footer-decoration {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
      margin-top: 80px;
      opacity: 0;
      animation: footerReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.8s forwards;
    }

    @keyframes footerReveal {
      to { opacity: 1; }
    }

    .geo-square {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border);
      transform: rotate(45deg);
      animation: squareFloat 4s ease-in-out infinite;
    }

    @keyframes squareFloat {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(-10px); }
    }

    .geo-line {
      width: 80px;
      height: 2px;
      background: var(--border);
      align-self: center;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .container {
        padding: 40px 20px;
      }

      .header {
        flex-direction: column;
        gap: 24px;
        margin-bottom: 60px;
      }

      .title {
        font-size: 42px;
      }

      .header-controls {
        position: static;
        flex-wrap: wrap;
        gap: 8px;
        animation-delay: 0.4s;
      }

      .stats {
        gap: 24px;
      }

      .stat-value {
        font-size: 36px;
      }

      .add-btn {
        padding: 0 16px;
      }

      .add-btn span {
        display: none;
      }

      .task-item {
        padding: 16px;
        gap: 16px;
      }

      .footer-decoration {
        justify-content: center;
      }

      .priority-selector {
        flex-wrap: wrap;
      }

      .priority-label {
        width: 100%;
        margin-bottom: 8px;
      }

      .priority-btn {
        flex: 1;
        padding: 10px 8px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Background particles -->
  <div class="bg-particles" id="particles"></div>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <div class="header-left">
          <div class="geo-circle"></div>
          <div>
            <h1 class="title" data-i18n="title">待办<span class="title-accent">事项</span></h1>
            <p class="subtitle" data-i18n="subtitle">任务管理系统</p>
          </div>
        </div>
      </div>
      <div class="header-controls">
        <div class="theme-toggle">
          <button class="theme-btn active" data-theme="light" title="Light">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
          <button class="theme-btn" data-theme="dark" title="Dark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
          <button class="theme-btn" data-theme="auto" title="System">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
          </button>
        </div>
        <div class="lang-toggle">
          <button class="lang-btn active" data-lang="zh">中</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <div class="header-line"></div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="activeCount">0</span>
        <span class="stat-label" data-i18n="active">进行中</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="completedCount">0</span>
        <span class="stat-label" data-i18n="completed">已完成</span>
      </div>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <div class="priority-selector">
        <span class="priority-label" data-i18n="priority">优先级</span>
        <button class="priority-btn active" data-priority="high" data-i18n="high">高</button>
        <button class="priority-btn" data-priority="medium" data-i18n="medium">中</button>
        <button class="priority-btn" data-priority="low" data-i18n="low">低</button>
      </div>
      <div class="input-wrapper" id="inputWrapper">
        <input
          type="text"
          class="task-input"
          id="taskInput"
          data-i18n-placeholder="placeholder"
          placeholder="输入待办事项..."
          maxlength="100"
          autocomplete="off"
        >
        <button class="add-btn" id="addBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span data-i18n="add">添加</span>
        </button>
      </div>
    </div>

    <!-- Active Tasks -->
    <section class="section" id="activeSection">
      <div class="section-header">
        <h2 class="section-title" data-i18n="activeTasks">进行中</h2>
        <span class="section-count" id="activeSectionCount">0</span>
        <div class="section-line"></div>
      </div>
      <div class="task-list" id="activeList"></div>
    </section>

    <!-- Completed Tasks -->
    <section class="section" id="completedSection">
      <div class="section-header">
        <h2 class="section-title" data-i18n="completedTasks">已完成</h2>
        <span class="section-count" id="completedSectionCount">0</span>
        <div class="section-line"></div>
      </div>
      <div class="task-list" id="completedList"></div>
    </section>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <p class="empty-state-text" data-i18n="empty">这里什么都没有</p>
      <p class="empty-state-hint" data-i18n="emptyHint">在上方添加你的第一个待办事项</p>
    </div>

    <!-- Footer Decoration -->
    <div class="footer-decoration">
      <div class="geo-line"></div>
      <div class="geo-square"></div>
    </div>
  </div>

  <script>
    // Create background particles
    function createParticles() {
      const container = document.getElementById('particles');
      const particleCount = 15;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.animationDelay = `${Math.random() * 8}s`;
        particle.style.animationDuration = `${6 + Math.random() * 4}s`;
        container.appendChild(particle);
      }
    }

    // i18n translations
    const i18n = {
      zh: {
        title: '待办<span class="title-accent">事项</span>',
        subtitle: '任务管理系统',
        active: '进行中',
        completed: '已完成',
        priority: '优先级',
        high: '高',
        medium: '中',
        low: '低',
        placeholder: '输入待办事项...',
        add: '添加',
        activeTasks: '进行中',
        completedTasks: '已完成',
        empty: '这里什么都没有',
        emptyHint: '在上方添加你的第一个待办事项',
        justNow: '刚刚',
        minutesAgo: '分钟前',
        hoursAgo: '小时前',
        daysAgo: '天前'
      },
      en: {
        title: 'CONSTRUCT<span class="title-accent"> //</span> TODO',
        subtitle: 'TASK MANAGEMENT SYSTEM',
        active: 'Active',
        completed: 'Done',
        priority: 'PRIORITY',
        high: 'HIGH',
        medium: 'MED',
        low: 'LOW',
        placeholder: 'Enter your task...',
        add: 'ADD',
        activeTasks: 'ACTIVE',
        completedTasks: 'COMPLETED',
        empty: 'NOTHING HERE.',
        emptyHint: 'Add your first task above',
        justNow: 'Just now',
        minutesAgo: 'm ago',
        hoursAgo: 'h ago',
        daysAgo: 'd ago'
      }
    };

    // State
    let tasks = [];
    let currentPriority = 'high';
    let currentLang = localStorage.getItem('todo_lang') || 'zh';
    const STORAGE_KEY = 'construct_todo_tasks';
    const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };

    // DOM Elements
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const inputWrapper = document.getElementById('inputWrapper');
    const activeList = document.getElementById('activeList');
    const completedList = document.getElementById('completedList');
    const activeSection = document.getElementById('activeSection');
    const completedSection = document.getElementById('completedSection');
    const emptyState = document.getElementById('emptyState');
    const activeCount = document.getElementById('activeCount');
    const completedCount = document.getElementById('completedCount');
    const activeSectionCount = document.getElementById('activeSectionCount');
    const completedSectionCount = document.getElementById('completedSectionCount');
    const priorityBtns = document.querySelectorAll('.priority-btn');
    const langBtns = document.querySelectorAll('.lang-btn');
    const themeBtns = document.querySelectorAll('.theme-btn');

    // Theme management
    const THEME_STORAGE_KEY = 'todo_theme';
    let currentTheme = localStorage.getItem(THEME_STORAGE_KEY) || 'auto';

    function getSystemTheme() {
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme(theme) {
      currentTheme = theme;
      localStorage.setItem(THEME_STORAGE_KEY, theme);

      let effectiveTheme = theme;
      if (theme === 'auto') {
        effectiveTheme = getSystemTheme();
      }

      document.documentElement.setAttribute('data-theme', effectiveTheme);

      themeBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === theme);
      });
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (currentTheme === 'auto') {
        applyTheme('auto');
      }
    });

    // Animate number change
    function animateNumber(element, newValue) {
      const current = parseInt(element.textContent) || 0;
      if (current === newValue) return;

      element.classList.add('bump');
      setTimeout(() => element.classList.remove('bump'), 300);

      const duration = 300;
      const steps = 10;
      const increment = (newValue - current) / steps;
      let step = 0;

      const interval = setInterval(() => {
        step++;
        element.textContent = Math.round(current + increment * step);
        if (step >= steps) {
          element.textContent = newValue;
          clearInterval(interval);
        }
      }, duration / steps);
    }

    // Apply language
    function applyLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('todo_lang', lang);
      document.body.classList.toggle('lang-en', lang === 'en');

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang][key]) {
          el.innerHTML = i18n[lang][key];
        }
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.dataset.i18nPlaceholder;
        if (i18n[lang][key]) {
          el.placeholder = i18n[lang][key];
        }
      });

      langBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      render();
    }

    // Load tasks from localStorage
    function loadTasks() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          tasks = JSON.parse(stored);
        }
      } catch (e) {
        tasks = [];
      }
    }

    // Save tasks to localStorage
    function saveTasks() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      } catch (e) {
        console.warn('Could not save tasks to localStorage');
      }
    }

    // Generate unique ID
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    // Format time
    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;

      if (diff < 60000) return i18n[currentLang].justNow;
      if (diff < 3600000) return `${Math.floor(diff / 60000)}${i18n[currentLang].minutesAgo}`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}${i18n[currentLang].hoursAgo}`;

      return date.toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : 'en-US', {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // Create task element
    function createTaskElement(task, index) {
      const el = document.createElement('div');
      el.className = `task-item ${task.completed ? 'completed' : ''} priority-${task.priority}`;
      el.dataset.id = task.id;

      setTimeout(() => {
        el.classList.add('show');
      }, index * 80);

      el.innerHTML = `
        <div class="checkbox" data-action="toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="priority-indicator ${task.priority}"></div>
        <div class="task-content">
          <span class="task-text">${escapeHtml(task.text)}</span>
          <input type="text" class="task-text-input" value="${escapeHtml(task.text)}" style="display: none;">
          <span class="task-time">${formatTime(task.createdAt)}</span>
        </div>
        <div class="task-actions">
          <button class="edit-btn" data-action="edit" aria-label="Edit task">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
          </button>
          <button class="delete-btn" data-action="delete" aria-label="Delete task">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      `;

      return el;
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Render all tasks
    function render() {
      const sortedTasks = [...tasks].sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        return PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
      });

      const activeTasks = sortedTasks.filter(t => !t.completed);
      const completedTasks = sortedTasks.filter(t => t.completed);

      animateNumber(activeCount, activeTasks.length);
      animateNumber(completedCount, completedTasks.length);
      animateNumber(activeSectionCount, activeTasks.length);
      animateNumber(completedSectionCount, completedTasks.length);

      const activeCountEl = document.getElementById('activeSectionCount');
      const completedCountEl = document.getElementById('completedSectionCount');
      activeCountEl.classList.add('bump');
      completedCountEl.classList.add('bump');
      setTimeout(() => {
        activeCountEl.classList.remove('bump');
        completedCountEl.classList.remove('bump');
      }, 300);

      activeSection.classList.toggle('visible', activeTasks.length > 0);
      completedSection.classList.toggle('visible', completedTasks.length > 0);
      emptyState.style.display = tasks.length === 0 ? 'block' : 'none';

      activeList.innerHTML = '';
      activeTasks.forEach((task, i) => {
        activeList.appendChild(createTaskElement(task, i));
      });

      completedList.innerHTML = '';
      completedTasks.forEach((task, i) => {
        completedList.appendChild(createTaskElement(task, i));
      });
    }

    // Add new task
    function addTask() {
      const text = taskInput.value.trim();

      if (!text) {
        inputWrapper.classList.add('shake');
        setTimeout(() => inputWrapper.classList.remove('shake'), 500);
        taskInput.focus();
        return;
      }

      const task = {
        id: generateId(),
        text: text,
        priority: currentPriority,
        completed: false,
        createdAt: Date.now()
      };

      tasks.unshift(task);
      saveTasks();
      render();

      taskInput.value = '';
      taskInput.focus();
    }

    // Toggle task completion
    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.completed = !task.completed;
        task.completedAt = task.completed ? Date.now() : null;
        saveTasks();
        render();
      }
    }

    // Delete task
    function deleteTask(id) {
      const el = document.querySelector(`.task-item[data-id="${id}"]`);
      if (el) {
        el.classList.add('removing');
        setTimeout(() => {
          tasks = tasks.filter(t => t.id !== id);
          saveTasks();
          render();
        }, 500);
      }
    }

    // Start editing
    function startEdit(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;

      const taskItem = document.querySelector(`.task-item[data-id="${id}"]`);
      if (!taskItem || taskItem.classList.contains('completed')) return;

      taskItem.classList.add('editing');
      const input = taskItem.querySelector('.task-text-input');
      input.style.display = 'block';
      input.focus();
      input.select();
    }

    // Save edit
    function saveEdit(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;

      const taskItem = document.querySelector(`.task-item[data-id="${id}"]`);
      if (!taskItem) return;

      const input = taskItem.querySelector('.task-text-input');
      const newText = input.value.trim();

      if (newText && newText !== task.text) {
        task.text = newText;
        saveTasks();
      }

      taskItem.classList.remove('editing');
      input.style.display = 'none';
      render();
    }

    // Cancel edit
    function cancelEdit(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;

      const taskItem = document.querySelector(`.task-item[data-id="${id}"]`);
      if (!taskItem) return;

      const input = taskItem.querySelector('.task-text-input');
      input.value = task.text;
      taskItem.classList.remove('editing');
      input.style.display = 'none';
    }

    // Event delegation for task actions
    document.addEventListener('click', (e) => {
      const taskItem = e.target.closest('.task-item');
      if (!taskItem) return;

      const action = e.target.closest('[data-action]')?.dataset.action;
      const id = taskItem.dataset.id;

      if (action === 'toggle') {
        toggleTask(id);
      } else if (action === 'delete') {
        deleteTask(id);
      } else if (action === 'edit') {
        startEdit(id);
      }
    });

    // Handle enter key in inline edit
    document.addEventListener('keydown', (e) => {
      if (e.target.classList.contains('task-text-input')) {
        if (e.key === 'Enter') {
          const taskItem = e.target.closest('.task-item');
          if (taskItem) {
            saveEdit(taskItem.dataset.id);
          }
        } else if (e.key === 'Escape') {
          const taskItem = e.target.closest('.task-item');
          if (taskItem) {
            cancelEdit(taskItem.dataset.id);
          }
        }
      }
    });

    // Add button click
    addBtn.addEventListener('click', addTask);

    // Enter key to submit
    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        addTask();
      }
    });

    // Priority selector
    priorityBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        priorityBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPriority = btn.dataset.priority;
      });
    });

    // Language toggle
    langBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        applyLanguage(btn.dataset.lang);
      });
    });

    // Theme toggle
    themeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        applyTheme(btn.dataset.theme);
      });
    });

    // Update time displays periodically
    setInterval(() => {
      document.querySelectorAll('.task-time').forEach(el => {
        const taskEl = el.closest('.task-item');
        if (taskEl) {
          const id = taskEl.dataset.id;
          const task = tasks.find(t => t.id === id);
          if (task) {
            el.textContent = formatTime(task.createdAt);
          }
        }
      });
    }, 60000);

    // Intersection Observer for sections
    const sectionObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    // Initialize
    createParticles();
    loadTasks();
    applyLanguage(currentLang);
    applyTheme(currentTheme);

    setTimeout(() => {
      document.querySelectorAll('.section').forEach(section => {
        sectionObserver.observe(section);
      });
    }, 100);
  </script>
</body>
</html>
